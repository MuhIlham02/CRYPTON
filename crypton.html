<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRYPTON</title>
    
    <link rel="icon" type="image/svg+xml" href="logo-crypton.svg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        /* [FIX] Menghilangkan background putih/kuning bawaan browser saat Autofill */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px var(--input-bg) inset !important;
            -webkit-text-fill-color: var(--text-white) !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        :root {
            --bg-base: #0A152B; 
            --panel-bg: rgba(0, 144, 249, 0.15); 
            --input-bg: #040A15; 
            
            --border-panel: #143559;
            --border-input: #1A477A;
            
            --text-white: #ffffff;
            --text-content: #8CA8C4; 
            --text-cyan: #00C1E2;
            
            --grad-start: #00C1E2;
            --grad-end: #00C1E2;
        }

        body {
            margin: 0;
            padding: 30px 40px;
            background-color: var(--bg-base);
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            background-blend-mode: overlay;
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* HEADER & TYPOGRAPHY */
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 12px;
        }

        .logo-area { display: flex; flex-direction: column; }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 2.5rem;
            color: var(--text-white);
            margin: 0;
            text-shadow: 0 0 10px #00C1E2, 0 0 20px #00C1E2;
            letter-spacing: 2px;
            line-height: 1;
        }

        .sub-logo {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--text-white);
            margin-top: 8px;
            text-shadow: 0 0 5px rgba(0, 193, 226, 0.4);
            letter-spacing: 1.5px;
        }

        .tagline {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 400;
            font-size: 0.9rem;
            background: linear-gradient(to right, var(--grad-start), var(--grad-end));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .header-line {
            width: 100%;
            height: 2px;
            background: linear-gradient(to right, var(--grad-start), var(--grad-end));
            margin-bottom: 30px;
            box-shadow: 0 0 8px rgba(0, 193, 226, 0.5);
        }

        /* TRANSLATOR AREA (BORDERLESS STYLE) */
        .translator-area {
            display: flex;
            gap: 20px;
            flex-grow: 1;
            min-height: 0;
            align-items: stretch;
        }

        .trans-col {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .trans-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        /* PERUBAHAN LABEL: Pake Orbitron + Glow persis Crypton */
        .trans-header span {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text-white);
            text-shadow: 0 0 10px #00C1E2, 0 0 20px #00C1E2;
            letter-spacing: 1px;
        }

        select {
            width: 200px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-panel);
            color: var(--text-white);
            padding: 8px 12px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 400;
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2300C1E2%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 10px top 50%;
            background-size: 10px auto;
            transition: 0.3s;
        }

        select:focus { border-color: var(--text-cyan); box-shadow: 0 0 8px rgba(0, 193, 226, 0.3); }

        /* TEXT BOXES DENGAN GLOW SESUAI DESAIN BARU */
        .trans-box-wrapper {
            background-color: var(--input-bg);
            border: 1px solid var(--border-panel);
            border-radius: 8px;
            flex-grow: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: 0.3s;
        }

        .trans-box-wrapper:focus-within {
            border-color: var(--text-cyan);
            box-shadow: 0 0 10px rgba(0, 193, 226, 0.2);
        }

        textarea {
            background: transparent;
            border: none;
            color: var(--text-white);
            padding: 20px 40px 20px 20px; 
            width: 100%;
            height: 100%;
            resize: none;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 400;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
        }

        textarea::placeholder { color: #4A6583; }

        /* SWAP ICON */
        .swap-col {
            display: flex;
            align-items: center;
            justify-content: center;
            padding-top: 35px; 
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-content);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
            transition: color 0.3s ease; 
        }

        .icon-btn svg {
            transition: transform 0.3s ease;
            transform-origin: center center; /* Titik tumpu mutlak di tengah */
        }

        .icon-btn:hover { 
            color: var(--text-cyan); 
        }
        .icon-btn:hover svg {
            transform: scale(1.15); /* Zoom ikonnya dari dalam */
        }

        .swap-btn {
            width: 40px; height: 40px;
            border-radius: 50%;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-panel);
            color: var(--text-cyan);
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .swap-btn:hover { border-color: var(--text-cyan); box-shadow: 0 0 15px rgba(0, 193, 226, 0.4); }

        /* KEY BOX (Glow ala desain barumu) */
        .key-area-wrapper {
            margin-top: 25px;
            display: flex;
            justify-content: center;
        }

        .key-box {
            width: 70%;
            background-color: var(--input-bg);
            border: 1px solid var(--border-panel); /* [FIX] Balikin ke warna redup */
            border-radius: 8px;
            display: flex;
            align-items: center; 
            padding: 0 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: 0.3s;
            height: 55px; 
        }

        /* [BARU] Cuma nyala Cyan pas lagi di-klik/ketik di dalamnya */
        .key-box:focus-within {
            border-color: var(--text-cyan);
            box-shadow: 0 0 10px rgba(0, 193, 226, 0.3);
        }

        .key-box input {
            background: transparent;
            border: none;
            color: var(--text-white);
            font-family: 'JetBrains Mono', monospace;
            font-weight: 400;
            font-size: 1rem;
            flex-grow: 1;
            height: 100%;
            outline: none;
        }
        
        .key-box input::placeholder { color: #4A6583; }

        .key-actions {
            display: flex;
            gap: 15px; /* Jarak antara X dan Mata */
            margin-left: 10px;
            align-items: center; /* Vertikal center 100% presisi */
            height: 100%;
        }

        .abs-top-right {
            position: absolute;
            top: 15px;
            right: 15px;
        }

        /* Posisi tombol Mute di ujung kanan sejajar dengan Key Box */
        .abs-right-center {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-cyan); /* Nyala default */
        }

        /* DROP ZONE FILE */
        #dropZoneArea {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(4, 10, 21, 0.9);
            border: 2px dashed var(--border-panel);
            border-radius: 8px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-content);
            cursor: pointer;
            transition: 0.3s;
            z-index: 10;
        }
        #dropZoneArea:hover, #dropZoneArea.dragover { border-color: var(--text-cyan); color: var(--text-cyan); }
        #dropZoneArea svg { width: 40px; height: 40px; margin-bottom: 10px; opacity: 0.7; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-panel); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-cyan); }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <h1>CRYPTON</h1>
            <div class="sub-logo">CLASSIFIED CRYPTOGRAPHY TOOL</div>
        </div>
        <div class="tagline">"Decrypt the Secrets. Operate in the Shadows."</div>
    </header>
    <div class="header-line"></div>

    <div class="translator-area">
        
        <div class="trans-col">
            <div class="trans-header">
                <span id="leftLabel">Plaintext</span>
                <select id="inputType">
                    <option value="text">Manual Text</option>
                    <option value="file">File Base64 Upload</option>
                </select>
            </div>
            <div class="trans-box-wrapper">
                <textarea id="plaintext" placeholder="Enter the text here..."></textarea>
                
                <button id="btnClearText" class="icon-btn abs-top-right" style="display:none;" onclick="clearText()" title="Clear text">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"></path></svg>
                </button>

                <div id="dropZoneArea" onclick="document.getElementById('fileUpload').click()">
                    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 16.5V9.75m0 0l3 3m-3-3l-3 3M6.75 19.5a4.5 4.5 0 01-1.41-8.775 5.25 5.25 0 0110.233-2.33 3 3 0 013.758 3.848A3.752 3.752 0 0118 19.5H6.75z" /></svg>
                    <p style="margin:0; font-family:'JetBrains Mono'; font-size:0.9rem;">Click or drag file to parse</p>
                    <input type="file" id="fileUpload" style="display: none;">
                </div>
            </div>
        </div>

        <div class="swap-col">
            <button class="icon-btn swap-btn" onclick="swapAction()" title="Swap mode">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3L4 7l4 4M4 7h16M16 21l4-4-4-4M20 17H4"></path></svg>
            </button>
        </div>

        <div class="trans-col">
            <div class="trans-header">
                <span id="rightLabel">Ciphertext</span>
                <select id="algorithm">
                    <option value="vigenere">Vigenère Cipher</option>
                    <option value="affine">Affine Cipher</option>
                    <option value="playfair">Playfair Cipher</option>
                    <option value="hill">Hill Cipher</option>
                    <option value="enigma">Enigma Cipher</option>
                </select>
            </div>
            <div class="trans-box-wrapper">
                <textarea id="outputResult" readonly placeholder="Waiting the execution..."></textarea>
            </div>
        </div>
    </div>

    <div class="key-area-wrapper" style="position: relative; width: 100%;">
        <div class="key-box">
            <input type="password" id="key" placeholder="Insert the key...">
            <div class="key-actions">
                <button class="icon-btn" onclick="toggleKey()" title="Show/Hide Key" id="btnEye">
                    <svg id="eyeSvg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>
                    </svg>
                </button>
                <button id="btnClearKey" class="icon-btn" style="display:none;" onclick="clearKey()" title="Clear Key">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"></path></svg>
                </button>
            </div>
        </div>

        <button class="icon-btn abs-right-center" id="btnMute" onclick="toggleMute()" title="Mute/Unmute SFX">
            <svg id="muteSvg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            </svg>
        </button>
    </div>

    <audio id="sfx-typing" src="sfx/typing.mp3" preload="auto"></audio>
    <audio id="sfx-delete" src="sfx/delete.mp3" preload="auto"></audio>
    <audio id="sfx-open-eye" src="sfx/open-eye.mp3" preload="auto"></audio>
    <audio id="sfx-close-eye" src="sfx/close-eye.mp3" preload="auto"></audio>
    <audio id="sfx-swipe" src="sfx/swipe.mp3" preload="auto"></audio>
    <audio id="sfx-open-feature" src="sfx/open-feature.mp3" preload="auto"></audio>
    <audio id="sfx-pick-feature" src="sfx/pick-feature.mp3" preload="auto"></audio>

<script>
    const inputType = document.getElementById('inputType');
    const plaintextArea = document.getElementById('plaintext');
    const outputResult = document.getElementById('outputResult');
    const keyInput = document.getElementById('key');
    const algorithm = document.getElementById('algorithm');
    const dropZoneArea = document.getElementById('dropZoneArea');
    const fileUpload = document.getElementById('fileUpload');
    
    let isMuted = false;
    let isEncrypting = true; 

    plaintextArea.addEventListener('input', function() {
        // [FIX] Ganti 'block' jadi 'flex' biar ikon X sejajar sempurna
        document.getElementById('btnClearText').style.display = this.value.length > 0 ? 'flex' : 'none';
        autoProcess();
    });

    keyInput.addEventListener('input', function() {
        // [FIX] Ganti 'block' jadi 'flex'
        document.getElementById('btnClearKey').style.display = this.value.length > 0 ? 'flex' : 'none';
        autoProcess();
    });

    algorithm.addEventListener('change', autoProcess);

    // ==========================================
    // AUDIO CONTROLLER (SFX)
    // ==========================================
    function playSound(soundId) {
        if (isMuted) return; // Kalau lagi di-mute, batalkan semua suara!
        const sound = document.getElementById(soundId);
        if (!sound) return;
        const clone = sound.cloneNode();
        clone.volume = 0.5;
        clone.play().catch((e) => {});
    }

    // Sensor ketikan
    function handleTypingSound(e) {
        const ignoredKeys = ['Shift', 'Control', 'Alt', 'Meta', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Tab', 'Escape', 'CapsLock'];
        if (ignoredKeys.includes(e.key)) return;

        if (e.key === 'Backspace' || e.key === 'Delete') {
            playSound('sfx-delete'); // Bunyi pas ngehapus manual
        } else {
            playSound('sfx-typing'); // Bunyi pas ngetik biasa
        }
    }

    plaintextArea.addEventListener('keydown', handleTypingSound);
    keyInput.addEventListener('keydown', handleTypingSound);

    // Sensor Dropdown (Membuka & Memilih)
    inputType.addEventListener('mousedown', () => playSound('sfx-open-feature'));
    algorithm.addEventListener('mousedown', () => playSound('sfx-open-feature'));
    
    inputType.addEventListener('change', () => playSound('sfx-pick-feature'));
    algorithm.addEventListener('change', () => playSound('sfx-pick-feature'));

    function swapAction() {
        playSound('sfx-swipe'); // <-- TAMBAHAN SUARA SWIPE DI SINI
        isEncrypting = !isEncrypting;
        document.getElementById('leftLabel').textContent = isEncrypting ? 'Plaintext' : 'Ciphertext';
        document.getElementById('rightLabel').textContent = isEncrypting ? 'Ciphertext' : 'Plaintext';
        let rightText = outputResult.value;
        if(rightText && !rightText.startsWith('> Error')) { plaintextArea.value = rightText; }
        autoProcess();
    }

    function clearText() {
        playSound('sfx-delete'); // <-- TAMBAHAN SUARA DELETE DI SINI
        plaintextArea.value = '';
        document.getElementById('btnClearText').style.display = 'none';
        autoProcess();
    }

    function clearKey() {
        playSound('sfx-delete'); // <-- TAMBAHAN SUARA DELETE DI SINI
        keyInput.value = '';
        document.getElementById('btnClearKey').style.display = 'none';
        autoProcess();
    }

    // LOGIKA IKON MATA BARU
    function toggleKey() {
        const eyeSvg = document.getElementById('eyeSvg');
        if (keyInput.type === "password") {
            keyInput.type = "text";
            // Ganti SVG ke Mata Terbuka
            eyeSvg.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            playSound('sfx-open-eye'); // <-- TAMBAHAN SUARA MATA KACAMATA TERBUKA
        } else {
            keyInput.type = "password";
            // Ganti SVG ke Mata Tertutup/Coret
            eyeSvg.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            playSound('sfx-close-eye'); // <-- TAMBAHAN SUARA MATA TERTUTUP
        }
    }

    function toggleMute() {
        const muteSvg = document.getElementById('muteSvg');
        const btnMute = document.getElementById('btnMute');
        
        if (isMuted) {
            // PROSES UNMUTE (Menyalakan Suara)
            isMuted = false;
            playSound('sfx-open-eye'); // [GANTI DI SINI] Pake suara mata kebuka pas suara dinyalain
            
            // Ganti icon ke Volume Nyala & warna Cyan
            btnMute.style.color = "var(--text-cyan)";
            muteSvg.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>';
        } else {
            // PROSES MUTE (Mematikan Suara)
            playSound('sfx-close-eye'); // [GANTI DI SINI] Pake suara mata ketutup pas suara dimatiin
            isMuted = true; 
            
            // Ganti icon ke Volume Silang (X) & warna abu-abu mati
            btnMute.style.color = "var(--text-content)";
            muteSvg.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line>';
        }
    }

    function autoProcess() {
        let text = plaintextArea.value;
        let key = keyInput.value;
        let algo = algorithm.value;

        if (!text) { outputResult.value = ""; return; }
        if (!key) { outputResult.value = "> System Halt: Kunci (Key) wajib diisi."; return; }

        if (algo === 'vigenere') outputResult.value = vigenere(text, key, isEncrypting);
        else if (algo === 'affine') outputResult.value = affine(text, key, isEncrypting);
        else if (algo === 'playfair') outputResult.value = playfair(text, key, isEncrypting);
        else if (algo === 'hill') outputResult.value = hill(text, key, isEncrypting);
        else if (algo === 'enigma') outputResult.value = enigma(text, key); 
    }

    inputType.addEventListener('change', function() {
        if (this.value === 'text') {
            plaintextArea.style.opacity = '1';
            dropZoneArea.style.display = 'none';
        } else {
            plaintextArea.style.opacity = '0.1'; 
            dropZoneArea.style.display = 'flex';
        }
    });

    dropZoneArea.addEventListener('dragover', (e) => { e.preventDefault(); dropZoneArea.classList.add('dragover'); });
    dropZoneArea.addEventListener('dragleave', () => { dropZoneArea.classList.remove('dragover'); });
    dropZoneArea.addEventListener('drop', (e) => {
        e.preventDefault(); dropZoneArea.classList.remove('dragover');
        if (e.dataTransfer.files.length) { fileUpload.files = e.dataTransfer.files; processFile(fileUpload.files[0]); }
    });
    fileUpload.addEventListener('change', function(e) { if (e.target.files.length) processFile(e.target.files[0]); });

    function processFile(file) {
        if (file.size > 2 * 1024 * 1024) alert("> System Warning: File besar dapat menyebabkan lag pada browser.");
        let reader = new FileReader();
        reader.onload = function(event) {
            plaintextArea.value = event.target.result;
            inputType.value = 'text';
            plaintextArea.style.opacity = '1';
            dropZoneArea.style.display = 'none';
            document.getElementById('btnClearText').style.display = 'block';
            autoProcess();
        };
        reader.readAsDataURL(file);
    }

    function vigenere(text, key, isEncrypt) {
        key = key.toUpperCase().replace(/[^A-Z]/g, '');
        if (key.length === 0) return "> Error: Kunci harus alfabet!";
        let result = ""; let keyIndex = 0;
        for (let i = 0; i < text.length; i++) {
            let char = text[i];
            if (char.match(/[a-z]/i)) {
                let isUpper = char === char.toUpperCase();
                let charCode = char.charCodeAt(0);
                let base = isUpper ? 65 : 97;
                let k = key[keyIndex % key.length].charCodeAt(0) - 65;
                if (!isEncrypt) k = (26 - k) % 26; 
                let newCharCode = ((charCode - base + k) % 26) + base;
                result += String.fromCharCode(newCharCode);
                keyIndex++;
            } else { result += char; }
        }
        return result;
    }

    function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }
    function modInverse(a, m) {
        a = ((a % m) + m) % m;
        for (let x = 1; x < m; x++) { if ((a * x) % m === 1) return x; }
        return -1;
    }
    
    function affine(text, keyString, isEncrypt) {
        let keys = keyString.split(',');
        if (keys.length !== 2) return "> Error: Format Affine 'a,b'";
        let a = parseInt(keys[0].trim()); let b = parseInt(keys[1].trim());
        if (isNaN(a) || isNaN(b)) return "> Error: Kunci a dan b harus angka!";
        if (gcd(a, 26) !== 1) return "> Error: Nilai 'a' tidak coprime.";
        let result = ""; let a_inv = modInverse(a, 26);
        if (!isEncrypt && a_inv === -1) return "> Error: Invers gagal!";
        for (let i = 0; i < text.length; i++) {
            let char = text[i];
            if (char.match(/[a-z]/i)) {
                let isUpper = char === char.toUpperCase();
                let base = isUpper ? 65 : 97;
                let x = char.charCodeAt(0) - base;
                let newCharCode;
                if (isEncrypt) newCharCode = ((a * x + b) % 26);
                else { newCharCode = (a_inv * (x - b)) % 26; if (newCharCode < 0) newCharCode += 26; }
                result += String.fromCharCode(newCharCode + base);
            } else { result += char; }
        }
        return result;
    }

    function generatePlayfairKey(key) {
        let alphabet = "ABCDEFGHIKLMNOPQRSTUVWXYZ"; 
        key = key.toUpperCase().replace(/[^A-Z]/g, '').replace(/J/g, 'I');
        let keySquare = "";
        for (let i = 0; i < key.length; i++) { if (!keySquare.includes(key[i])) keySquare += key[i]; }
        for (let i = 0; i < alphabet.length; i++) { if (!keySquare.includes(alphabet[i])) keySquare += alphabet[i]; }
        return keySquare;
    }
    
    function playfair(text, key, isEncrypt) {
        let keySquare = generatePlayfairKey(key);
        text = text.toUpperCase().replace(/[^A-Z]/g, '').replace(/J/g, 'I');
        if (text.length === 0) return "> Error: Pesan kosong!";
        let pairs = [];
        for (let i = 0; i < text.length; i++) {
            let char1 = text[i]; let char2 = text[i + 1];
            if (char2 === undefined) pairs.push([char1, 'X']);
            else if (char1 === char2) pairs.push([char1, 'X']);
            else { pairs.push([char1, char2]); i++; }
        }
        let result = "";
        for (let i = 0; i < pairs.length; i++) {
            let p1 = pairs[i][0]; let p2 = pairs[i][1];
            let index1 = keySquare.indexOf(p1); let index2 = keySquare.indexOf(p2);
            let row1 = Math.floor(index1 / 5), col1 = index1 % 5;
            let row2 = Math.floor(index2 / 5), col2 = index2 % 5;
            let newRow1, newCol1, newRow2, newCol2;
            if (row1 === row2) {
                let shift = isEncrypt ? 1 : 4; 
                newCol1 = (col1 + shift) % 5; newCol2 = (col2 + shift) % 5;
                newRow1 = row1; newRow2 = row2;
            } else if (col1 === col2) {
                let shift = isEncrypt ? 1 : 4;
                newRow1 = (row1 + shift) % 5; newRow2 = (row2 + shift) % 5;
                newCol1 = col1; newCol2 = col2;
            } else {
                newRow1 = row1; newCol1 = col2;
                newRow2 = row2; newCol2 = col1;
            }
            result += keySquare[newRow1 * 5 + newCol1] + keySquare[newRow2 * 5 + newCol2];
        }
        return result;
    }

    function hill(text, key, isEncrypt) {
        key = key.toUpperCase().replace(/[^A-Z]/g, '');
        if (key.length !== 4) return "> Error: Butuh kunci 4 huruf!";
        let k = [key.charCodeAt(0)-65, key.charCodeAt(1)-65, key.charCodeAt(2)-65, key.charCodeAt(3)-65]; 
        let det = (k[0] * k[3] - k[1] * k[2]) % 26;
        if (det < 0) det += 26; 
        if (gcd(det, 26) !== 1) return "> Error: Determinan tidak coprime.";
        let detInv = modInverse(det, 26);
        if (detInv === -1) return "> Error: Invers gagal!";
        let matrix;
        if (isEncrypt) matrix = k;
        else {
            matrix = [(k[3] * detInv) % 26, (-k[1] * detInv) % 26, (-k[2] * detInv) % 26, (k[0] * detInv) % 26];
            for (let i = 0; i < 4; i++) { if (matrix[i] < 0) matrix[i] += 26; }
        }
        text = text.toUpperCase().replace(/[^A-Z]/g, '');
        if (text.length % 2 !== 0) text += 'X'; 
        let result = "";
        for (let i = 0; i < text.length; i += 2) {
            let p0 = text.charCodeAt(i) - 65; let p1 = text.charCodeAt(i + 1) - 65;
            let c0 = (matrix[0] * p0 + matrix[1] * p1) % 26;
            let c1 = (matrix[2] * p0 + matrix[3] * p1) % 26;
            result += String.fromCharCode(c0 + 65) + String.fromCharCode(c1 + 65);
        }
        return result;
    }

    function enigma(text, key) {
        key = key.toUpperCase().replace(/[^A-Z]/g, '');
        if (key.length !== 3) return "> Error: Enigma butuh 3 huruf!";
        const R1 = "EKMFLGDQVZNTOWYHXUSPAIBRCJ"; const R2 = "AJDKSIRUXBLHWTMCQGZNPYFVOE";
        const R3 = "BDFHJLCPRTXVZNYEIWGAKMUSQO"; const REFLECTOR = "YRUHQSLDPXNGOKMIEBFZCWVJAT";
        const N1 = 'Q'.charCodeAt(0) - 65; const N2 = 'E'.charCodeAt(0) - 65; const N3 = 'V'.charCodeAt(0) - 65;
        let r1 = key.charCodeAt(0) - 65; let r2 = key.charCodeAt(1) - 65; let r3 = key.charCodeAt(2) - 65;
        function forward(c, rotor, offset) {
            let idx = (c + offset) % 26; let mapped = rotor.charCodeAt(idx) - 65;
            return (mapped - offset + 26) % 26;
        }
        function backward(c, rotor, offset) {
            let idx = (c + offset) % 26; let target = String.fromCharCode(idx + 65);
            let mapped = rotor.indexOf(target);
            return (mapped - offset + 26) % 26;
        }
        text = text.toUpperCase().replace(/[^A-Z]/g, ''); let result = "";
        for (let i = 0; i < text.length; i++) {
            let step2 = (r3 === N3); let step1 = (r2 === N2) && step2; 
            r3 = (r3 + 1) % 26; 
            if (step2) r2 = (r2 + 1) % 26;
            if (step1) r1 = (r1 + 1) % 26;
            let c = text.charCodeAt(i) - 65;
            c = forward(c, R3, r3); c = forward(c, R2, r2); c = forward(c, R1, r1);
            c = REFLECTOR.charCodeAt(c) - 65;
            c = backward(c, R1, r1); c = backward(c, R2, r2); c = backward(c, R3, r3);
            result += String.fromCharCode(c + 65);
        }
        return result;
    }
