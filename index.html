<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRYPTON</title>
    
    <link rel="icon" type="image/svg+xml" href="logo-crypton.svg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-base: #0A152B; 
            /* Ubah Hex jadi RGBA. Angka terakhir (0.6 / 0.4) adalah tingkat opacity-nya */
            --panel-bg: rgba(0, 144, 249, 0.25); /* Kotak luar transparan 60% */
            --input-bg: #040A15; 
            
            --border-panel: #143559;
            --border-input: #1A477A;
            
            --text-white: #ffffff;
            --text-content: #8CA8C4; 
            --text-cyan: #00C1E2;
            
            --grad-start: #00C1E2;
            --grad-end: #00C1E2;
        }

        body {
            margin: 0;
            padding: 30px 40px;
            background-color: var(--bg-base);
            
            /* VERSI LOKAL (Pastikan file gambar ada di folder yang sama dengan HTML) */
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            background-blend-mode: overlay;
            
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* HEADER & TYPOGRAPHY */
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 12px;
        }

        .logo-area { display: flex; flex-direction: column; }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 2.5rem;
            color: var(--text-white);
            margin: 0;
            text-shadow: 0 0 10px #00C1E2, 0 0 20px #00C1E2;
            letter-spacing: 2px;
            line-height: 1;
        }

        .sub-logo {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--text-white);
            margin-top: 8px;
            text-shadow: 0 0 5px rgba(0, 193, 226, 0.4);
            letter-spacing: 1.5px;
        }

        .tagline {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 400;
            font-size: 0.9rem;
            background: linear-gradient(to right, var(--grad-start), var(--grad-end));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .header-line {
            width: 100%;
            height: 2px;
            background: linear-gradient(to right, var(--grad-start), var(--grad-end));
            margin-bottom: 25px;
            box-shadow: 0 0 8px rgba(0, 193, 226, 0.5);
        }

        /* STRUKTUR PANEL ALIGNMENT FIGMA */
        .panel-container {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-panel);
            border-radius: 8px;
            padding: 18px; /* Diperkecil biar nggak bantet */
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
        }

        .top-panel {
            display: grid;
            grid-template-columns: 1fr 1fr 240px; /* Lebar kolom disesuaikan */
            gap: 20px;
            margin-bottom: 25px;
        }

        .col-wrapper {
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Biar tombol dan input merenggang rata */
            gap: 15px;
        }

        .input-box {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        label {
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--text-cyan);
            margin-bottom: 8px;
        }

        select, input, textarea {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--border-input);
            color: var(--text-content);
            padding: 12px 15px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 400;
            font-size: 0.9rem;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: var(--text-cyan);
            box-shadow: 0 0 8px rgba(0, 193, 226, 0.2);
            color: var(--text-cyan);
        }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2300C1E2%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 15px top 50%;
            background-size: 10px auto;
        }

        .input-box textarea {
            flex-grow: 1; /* Biar Key Area setinggi 2 dropdown */
            resize: none;
        }

        button.action-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-input);
            color: var(--text-content);
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 400;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        button.action-btn:hover {
            font-weight: 500;
            color: var(--text-cyan);
            border-color: var(--text-cyan);
            box-shadow: 0 0 15px rgba(0, 193, 226, 0.2);
        }

        /* BOTTOM PANELS */
        .bottom-panels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            flex-grow: 1;
            min-height: 0; /* Penting buat hindari overflow grid */
        }

        .io-content {
            position: relative;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            height: 100%;
        }

        .io-content textarea {
            height: 100%;
            resize: none;
        }

        /* --- STYLING KHUSUS DROP ZONE FILE --- */
        #dropZoneArea {
            display: none; /* Sembunyi default */
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--input-bg);
            border: 2px dashed var(--border-input);
            border-radius: 4px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-content);
            cursor: pointer;
            transition: 0.3s;
            z-index: 10;
        }

        #dropZoneArea:hover, #dropZoneArea.dragover {
            border-color: var(--text-cyan);
            background-color: rgba(0, 193, 226, 0.05);
            color: var(--text-cyan);
        }

        #dropZoneArea svg {
            width: 50px; height: 50px;
            margin-bottom: 15px;
            stroke: currentColor;
            opacity: 0.7;
        }

        #dropZoneArea p { margin: 5px 0; font-size: 0.95rem; }
        #dropZoneArea span { font-size: 0.8rem; opacity: 0.6; }

        /* Tombol Download */
        #btnDownload {
            margin-top: 15px;
            padding: 12px;
            background-color: #0A1F24;
            color: #00E2B2;
            border: 1px solid #00E2B2;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            cursor: pointer;
            transition: 0.3s;
        }
        #btnDownload:hover { background-color: #00E2B2; color: #02060D; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--input-bg); }
        ::-webkit-scrollbar-thumb { background: var(--border-input); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-cyan); }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <h1>CRYPTON</h1>
            <div class="sub-logo">CLASSIFIED CRYPTOGRAPHY TOOL</div>
        </div>
        <div class="tagline">"Decrypt the Secrets. Operate in the Shadows."</div>
    </header>
    <div class="header-line"></div>

    <div class="top-panel panel-container">
        <div class="col-wrapper">
            <div class="input-box" style="height: auto;">
                <label for="inputType">Type Input</label>
                <select id="inputType">
                    <option value="text">Manual Text</option>
                    <option value="file">File Base64 Upload</option>
                </select>
            </div>
            <div class="input-box" style="height: auto;">
                <label for="algorithm">Algorithm</label>
                <select id="algorithm">
                    <option value="vigenere">Vigenere Cipher</option>
                    <option value="affine">Affine Cipher</option>
                    <option value="playfair">Playfair Cipher</option>
                    <option value="hill">Hill Cipher</option>
                    <option value="enigma">Enigma Cipher</option>
                </select>
            </div>
        </div>

        <div class="col-wrapper">
            <div class="input-box">
                <label for="key">Key</label>
                <textarea id="key" placeholder="Insert the key..."></textarea>
            </div>
        </div>

        <div class="col-wrapper" style="justify-content: space-between; padding-top: 25px;">
            <button class="action-btn" onclick="prosesEnkripsi()">ENCRYPT</button>
            <button class="action-btn" onclick="prosesDekripsi()">DECRYPT</button>
        </div>
    </div>

    <div class="bottom-panels">
        <div class="panel-container">
            <label for="plaintext">Input</label>
            <div class="io-content">
                <textarea id="plaintext" placeholder="Enter the text here..."></textarea>
                
                <div id="dropZoneArea" onclick="document.getElementById('fileUpload').click()">
                    <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 16.5V9.75m0 0l3 3m-3-3l-3 3M6.75 19.5a4.5 4.5 0 01-1.41-8.775 5.25 5.25 0 0110.233-2.33 3 3 0 013.758 3.848A3.752 3.752 0 0118 19.5H6.75z" /></svg>
                    <p>Click to browse or drag file here</p>
                    <span>Supports Images, DB, Audio (Converted to Base64)</span>
                    <input type="file" id="fileUpload" style="display: none;">
                </div>
            </div>
        </div>

        <div class="panel-container">
            <label for="outputResult">Output</label>
            <div class="io-content">
                <textarea id="outputResult" readonly placeholder="Waiting the execution..."></textarea>
                <button id="btnDownload" style="display: none;" onclick="downloadFile()">DOWNLOAD DECRYPTED FILE</button>
            </div>
        </div>
    </div>

<script>
    // ==========================================
    // UI CONTROLLER & DROP ZONE LOGIC
    // ==========================================
    const inputType = document.getElementById('inputType');
    const plaintextArea = document.getElementById('plaintext');
    const dropZoneArea = document.getElementById('dropZoneArea');
    const fileUpload = document.getElementById('fileUpload');
    const outputResult = document.getElementById('outputResult');

    // Toggle Teks / File (Sesuai idenya kamu!)
    inputType.addEventListener('change', function() {
        if (this.value === 'text') {
            plaintextArea.style.display = 'block';
            dropZoneArea.style.display = 'none';
        } else {
            plaintextArea.style.display = 'none';
            dropZoneArea.style.display = 'flex';
        }
    });

    // Fitur Drag and Drop Animasi
    dropZoneArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZoneArea.classList.add('dragover');
    });
    dropZoneArea.addEventListener('dragleave', () => {
        dropZoneArea.classList.remove('dragover');
    });
    dropZoneArea.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZoneArea.classList.remove('dragover');
        if (e.dataTransfer.files.length) {
            fileUpload.files = e.dataTransfer.files;
            processFile(fileUpload.files[0]);
        }
    });

    // Fitur Klik Pilih File
    fileUpload.addEventListener('change', function(e) {
        if (e.target.files.length) {
            processFile(e.target.files[0]);
        }
    });

    function processFile(file) {
        if (file.size > 2 * 1024 * 1024) {
            alert("> System Warning: File besar dapat menyebabkan lag pada browser.");
        }
        let reader = new FileReader();
        reader.onload = function(event) {
            plaintextArea.value = event.target.result; // Simpan base64 diam-diam di textarea
            outputResult.value = "> SYSTEM LOG:\n> File [" + file.name + "] loaded and converted to Base64.\n> Ready for encryption process.";
            // Balikin layar ke teks biar user bisa liat hasil base64-nya kalau mau
            inputType.value = 'text';
            plaintextArea.style.display = 'block';
            dropZoneArea.style.display = 'none';
        };
        reader.readAsDataURL(file);
    }

    // Logika ganti Placeholder Kunci sesuai Algoritma
    document.getElementById('algorithm').addEventListener('change', function() {
        let algo = this.value;
        let keyInput = document.getElementById('key');
        if (algo === 'affine') keyInput.placeholder = "Enter 'a,b' (e.g. 5,8)";
        else if (algo === 'hill') keyInput.placeholder = "Enter 4 letters (e.g. DDCF)";
        else if (algo === 'enigma') keyInput.placeholder = "Enter 3 letters (e.g. ABC)";
        else keyInput.placeholder = "Insert the key...";
    });

    // ==========================================
    // ALGORITMA KRIPTOGRAFI
    // ==========================================
    
    // 1. VIGENERE
    function vigenere(text, key, isEncrypt) {
        if (!key) return "> Error: Kunci (Key) tidak boleh kosong!";
        key = key.toUpperCase().replace(/[^A-Z]/g, '');
        if (key.length === 0) return "> Error: Kunci harus mengandung huruf alfabet!";
        let result = ""; let keyIndex = 0;
        for (let i = 0; i < text.length; i++) {
            let char = text[i];
            if (char.match(/[a-z]/i)) {
                let isUpper = char === char.toUpperCase();
                let charCode = char.charCodeAt(0);
                let base = isUpper ? 65 : 97;
                let k = key[keyIndex % key.length].charCodeAt(0) - 65;
                if (!isEncrypt) k = (26 - k) % 26; 
                let newCharCode = ((charCode - base + k) % 26) + base;
                result += String.fromCharCode(newCharCode);
                keyIndex++;
            } else { result += char; }
        }
        return "> Execute::Success\n\n" + result;
    }

    // 2. AFFINE
    function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }
    function modInverse(a, m) {
        a = ((a % m) + m) % m;
        for (let x = 1; x < m; x++) { if ((a * x) % m === 1) return x; }
        return -1;
    }
    function affine(text, keyString, isEncrypt) {
        if (!keyString) return "> Error: Kunci (Key) tidak boleh kosong!";
        let keys = keyString.split(',');
        if (keys.length !== 2) return "> Error: Format kunci Affine harus 'a,b' (contoh: 5,8)";
        let a = parseInt(keys[0].trim()); let b = parseInt(keys[1].trim());
        if (isNaN(a) || isNaN(b)) return "> Error: Kunci a dan b harus berupa angka!";
        if (gcd(a, 26) !== 1) return "> Error: Nilai 'a' (" + a + ") tidak coprime dengan 26.";
        let result = ""; let a_inv = modInverse(a, 26);
        if (!isEncrypt && a_inv === -1) return "> Error: Invers matematika gagal ditemukan!";
        for (let i = 0; i < text.length; i++) {
            let char = text[i];
            if (char.match(/[a-z]/i)) {
                let isUpper = char === char.toUpperCase();
                let base = isUpper ? 65 : 97;
                let x = char.charCodeAt(0) - base;
                let newCharCode;
                if (isEncrypt) newCharCode = ((a * x + b) % 26);
                else { newCharCode = (a_inv * (x - b)) % 26; if (newCharCode < 0) newCharCode += 26; }
                result += String.fromCharCode(newCharCode + base);
            } else { result += char; }
        }
        return "> Execute::Success\n\n" + result;
    }

    // 3. PLAYFAIR
    function generatePlayfairKey(key) {
        let alphabet = "ABCDEFGHIKLMNOPQRSTUVWXYZ"; 
        key = key.toUpperCase().replace(/[^A-Z]/g, '').replace(/J/g, 'I');
        let keySquare = "";
        for (let i = 0; i < key.length; i++) { if (!keySquare.includes(key[i])) keySquare += key[i]; }
        for (let i = 0; i < alphabet.length; i++) { if (!keySquare.includes(alphabet[i])) keySquare += alphabet[i]; }
        return keySquare;
    }
    function playfair(text, key, isEncrypt) {
        if (!key) return "> Error: Kunci (Key) tidak boleh kosong!";
        let keySquare = generatePlayfairKey(key);
        text = text.toUpperCase().replace(/[^A-Z]/g, '').replace(/J/g, 'I');
        if (text.length === 0) return "> Error: Pesan tidak mengandung huruf alfabet!";
        let pairs = [];
        for (let i = 0; i < text.length; i++) {
            let char1 = text[i]; let char2 = text[i + 1];
            if (char2 === undefined) pairs.push([char1, 'X']);
            else if (char1 === char2) pairs.push([char1, 'X']);
            else { pairs.push([char1, char2]); i++; }
        }
        let result = "";
        for (let i = 0; i < pairs.length; i++) {
            let p1 = pairs[i][0]; let p2 = pairs[i][1];
            let index1 = keySquare.indexOf(p1); let index2 = keySquare.indexOf(p2);
            let row1 = Math.floor(index1 / 5), col1 = index1 % 5;
            let row2 = Math.floor(index2 / 5), col2 = index2 % 5;
            let newRow1, newCol1, newRow2, newCol2;
            if (row1 === row2) {
                let shift = isEncrypt ? 1 : 4; 
                newCol1 = (col1 + shift) % 5; newCol2 = (col2 + shift) % 5;
                newRow1 = row1; newRow2 = row2;
            } else if (col1 === col2) {
                let shift = isEncrypt ? 1 : 4;
                newRow1 = (row1 + shift) % 5; newRow2 = (row2 + shift) % 5;
                newCol1 = col1; newCol2 = col2;
            } else {
                newRow1 = row1; newCol1 = col2;
                newRow2 = row2; newCol2 = col1;
            }
            result += keySquare[newRow1 * 5 + newCol1] + keySquare[newRow2 * 5 + newCol2];
        }
        return "> Execute::Success\n\n[Format: J=I, Kembar/Ganjil=+X]\n\n" + result;
    }

    // 4. HILL
    function hill(text, key, isEncrypt) {
        if (!key) return "> Error: Kunci (Key) tidak boleh kosong!";
        key = key.toUpperCase().replace(/[^A-Z]/g, '');
        if (key.length !== 4) return "> Error: Hill Cipher 2x2 butuh kunci tepat 4 huruf! (Contoh: DDCF)";
        let k = [key.charCodeAt(0)-65, key.charCodeAt(1)-65, key.charCodeAt(2)-65, key.charCodeAt(3)-65]; 
        let det = (k[0] * k[3] - k[1] * k[2]) % 26;
        if (det < 0) det += 26; 
        if (gcd(det, 26) !== 1) return "> Error: Determinan matriks (" + det + ") tidak coprime dengan 26.";
        let detInv = modInverse(det, 26);
        if (detInv === -1) return "> Error: Invers determinan gagal ditemukan!";
        let matrix;
        if (isEncrypt) matrix = k;
        else {
            matrix = [(k[3] * detInv) % 26, (-k[1] * detInv) % 26, (-k[2] * detInv) % 26, (k[0] * detInv) % 26];
            for (let i = 0; i < 4; i++) { if (matrix[i] < 0) matrix[i] += 26; }
        }
        text = text.toUpperCase().replace(/[^A-Z]/g, '');
        if (text.length % 2 !== 0) text += 'X'; 
        let result = "";
        for (let i = 0; i < text.length; i += 2) {
            let p0 = text.charCodeAt(i) - 65; let p1 = text.charCodeAt(i + 1) - 65;
            let c0 = (matrix[0] * p0 + matrix[1] * p1) % 26;
            let c1 = (matrix[2] * p0 + matrix[3] * p1) % 26;
            result += String.fromCharCode(c0 + 65) + String.fromCharCode(c1 + 65);
        }
        return "> Execute::Success\n\n[Padding Ganjil: +X]\n" + result;
    }

    // 5. ENIGMA
    function enigma(text, key) {
        key = key.toUpperCase().replace(/[^A-Z]/g, '');
        if (key.length !== 3) return "> Error: Enigma butuh kunci tepat 3 huruf (Contoh: ABC)";
        const R1 = "EKMFLGDQVZNTOWYHXUSPAIBRCJ"; const R2 = "AJDKSIRUXBLHWTMCQGZNPYFVOE";
        const R3 = "BDFHJLCPRTXVZNYEIWGAKMUSQO"; const REFLECTOR = "YRUHQSLDPXNGOKMIEBFZCWVJAT";
        const N1 = 'Q'.charCodeAt(0) - 65; const N2 = 'E'.charCodeAt(0) - 65; const N3 = 'V'.charCodeAt(0) - 65;
        let r1 = key.charCodeAt(0) - 65; let r2 = key.charCodeAt(1) - 65; let r3 = key.charCodeAt(2) - 65;
        function forward(c, rotor, offset) {
            let idx = (c + offset) % 26; let mapped = rotor.charCodeAt(idx) - 65;
            return (mapped - offset + 26) % 26;
        }
        function backward(c, rotor, offset) {
            let idx = (c + offset) % 26; let target = String.fromCharCode(idx + 65);
            let mapped = rotor.indexOf(target);
            return (mapped - offset + 26) % 26;
        }
        text = text.toUpperCase().replace(/[^A-Z]/g, ''); let result = "";
        for (let i = 0; i < text.length; i++) {
            let step2 = (r3 === N3); let step1 = (r2 === N2) && step2; 
            r3 = (r3 + 1) % 26; 
            if (step2) r2 = (r2 + 1) % 26;
            if (step1) r1 = (r1 + 1) % 26;
            let c = text.charCodeAt(i) - 65;
            c = forward(c, R3, r3); c = forward(c, R2, r2); c = forward(c, R1, r1);
            c = REFLECTOR.charCodeAt(c) - 65;
            c = backward(c, R1, r1); c = backward(c, R2, r2); c = backward(c, R3, r3);
            result += String.fromCharCode(c + 65);
        }
        return "> Execute::Success\n\n[Rotor Settings: " + key + "]\n" + result;
    }

    // ==========================================
    // EXECUTION & DOWNLOAD
    // ==========================================
    function prosesEnkripsi() {
        let algo = document.getElementById('algorithm').value;
        let text = document.getElementById('plaintext').value;
        let key = document.getElementById('key').value;
        let output = outputResult;
        document.getElementById('btnDownload').style.display = 'none'; // Sembunyikan download saat enkripsi
        if (!text) { output.value = "> Error: Pesan input tidak boleh kosong!"; return; }
        if (algo === 'vigenere') output.value = vigenere(text, key, true);
        else if (algo === 'affine') output.value = affine(text, key, true);
        else if (algo === 'playfair') output.value = playfair(text, key, true);
        else if (algo === 'hill') output.value = hill(text, key, true);
        else if (algo === 'enigma') output.value = enigma(text, key); 
    }

    function prosesDekripsi() {
        let algo = document.getElementById('algorithm').value;
        let text = document.getElementById('plaintext').value;
        let key = document.getElementById('key').value;
        let output = outputResult;
        if (!text) { output.value = "> Error: Pesan input tidak boleh kosong!"; return; }
        if (algo === 'vigenere') output.value = vigenere(text, key, false);
        else if (algo === 'affine') output.value = affine(text, key, false);
        else if (algo === 'playfair') output.value = playfair(text, key, false);
        else if (algo === 'hill') output.value = hill(text, key, false);
        else if (algo === 'enigma') output.value = enigma(text, key); 
        
        // Munculkan tombol download kalau ada string data:image/ dsb
        if (output.value.includes('data:')) {
            document.getElementById('btnDownload').style.display = 'block';
        }
    }

    function downloadFile() {
        let outputText = outputResult.value;
        let base64Data = "";
        let parts = outputText.split('\n');
        for(let part of parts) { if(part.startsWith('data:')) base64Data = part.trim(); }

        if (!base64Data) { alert("> Error: Hasil dekripsi bukan format file (Base64) yang valid!"); return; }
        let a = document.createElement("a");
        a.href = base64Data;
        a.download = "Decrypted_File_Crypton";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }
</script>
